name: Telegram Coin Alert

on:
  workflow_dispatch:

  schedule:
    # 예비 알림: 00:05, 08:05, 12:05, 16:05, 20:05 KST
    # GitHub Actions cron은 UTC 기준
    - cron: "5 15,23,3,7,11 * * *"

    # 확정 알림: 09:10, 13:10, 17:10, 21:10 KST
    # GitHub Actions cron은 UTC 기준
    - cron: "10 0,4,8,12 * * *"

jobs:
  alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests pyupbit

      - name: Run Telegram alert bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ALERT_INTERVAL: "minute240"
          ALERT_CANDLE_COUNT: "700"
          REQUEST_DELAY: "0.12"
          MAX_ALERT_COUNT: "10"
          SEND_EMPTY_ALERT: "true"
        run: python alert_bot.py
